# Malt-beverage label rules, as declarative data (27 CFR Part 7). Same shape as
# the distilled-spirits rules, differing in the class/type designation list and
# in one obligation: alcohol content is NOT required. Under Part 7 an alcohol
# statement is permitted but not federally mandated (some states require it), so
# the field is omitted rather than modelled as always-required — a malt label
# that leaves it off is still compliant. Nothing here says *where* a field sits
# on the label; that is the reader's job.

type: malt-beverage
fields:
  - field: brand
    find: from_expected
    match: lenient
    required: always
    reasons:
      missing: brand-missing
      wrong: brand-wrong
      conflict: brand-conflict

  - field: name-and-address
    find: from_expected
    match: loose
    required: always
    reasons:
      missing: name-address-missing
      wrong: name-address-wrong
      conflict: name-address-conflict

  - field: warning
    find: fixed_text
    fixed_text: government-warning
    required: always
    reasons:
      missing: warning-missing
      wrong: warning-wrong
      caps: warning-caps
      unreadable: warning-unreadable
      conflict: warning-conflict

  - field: net-contents
    find: by_format
    format: net-contents
    required: always
    reasons:
      missing: net-contents-missing
      conflict: net-contents-conflict

  - field: class-type
    find: from_list
    list: malt-designations
    # loose: one label reading a fragment of the other's designation (OCR breaks
    # the phrase across lines) is not a disagreement.
    match: loose
    required: always
    reasons:
      missing: class-type-missing
      invalid: class-type-invalid
      unconfirmed: class-type-unconfirmed
      conflict: class-type-conflict

  - field: country-of-origin
    find: by_format
    format: country-of-origin
    required:
      when: imported
      source: application
    reasons:
      missing: country-of-origin-missing
      conflict: country-of-origin-conflict
