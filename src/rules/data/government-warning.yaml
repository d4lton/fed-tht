# The government health warning — fixed by regulation (27 CFR 16.21 / 16.22).
# Kept in one place the per-type rules point at, never copied per type.
#
# `text` is the exact required wording. The matcher compares the words while
# being deliberate about case: `caps_words` must appear in capital letters, but
# the rest may be all-caps or sentence case without being rejected.
id: government-warning
text: >-
  GOVERNMENT WARNING: (1) According to the Surgeon General, women should not
  drink alcoholic beverages during pregnancy because of the risk of birth
  defects. (2) Consumption of alcoholic beverages impairs your ability to drive
  a car or operate machinery, and may cause health problems.
caps_words:
  - GOVERNMENT WARNING
