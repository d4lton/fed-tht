# Local development environment.
#
# A plain start-up runs the whole app — the app service plus its database:
#
#   docker compose up -d --build   # build + run the app and Postgres
#   docker compose down            # stop everything (data is kept)
#   docker compose down -v         # stop and delete the data volume
#
# For the everyday coding loop (fast reload), start just the database by name and
# run the app however you prefer — on your machine, or with your code shared in:
#
#   docker compose up -d postgres  # database only, no app
#
# Watch out: a plain start-up runs the app inside Compose on port 3000, so if you
# are ALSO running it on your machine, start just the database instead — the two
# would otherwise collide on that port.
#
# The password here is a throwaway development value and is intentionally in the
# repo. Production credentials come from GCP, never from this file.

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: fed-tht-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fedtht_dev
      POSTGRES_USER: fedtht
      POSTGRES_PASSWORD: fedtht_dev_pw
    ports:
      - '5432:5432'
    volumes:
      # A named volume, so the data survives `docker compose down` and restarts.
      - fed-tht-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fedtht -d fedtht_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  # The packaged app, a normal default service. A plain `docker compose up`
  # brings it up alongside the database. For the coding loop, start just
  # `postgres` by name and run the app yourself instead.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fed-tht-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Use the local config source, but reach Postgres by its Compose service
      # name instead of the file's localhost default.
      NODE_ENV: local
      DB_HOST: postgres
      # Point the Google client library at the mounted credentials below, so the
      # reader's key can be fetched from Secret Manager from inside the container.
      # LOCAL ONLY: in production (Cloud Run/GKE/GCE) no file is used — the
      # attached service account is discovered automatically via the metadata
      # server, which is why the app code passes no credentials.
      GOOGLE_APPLICATION_CREDENTIALS: /gcloud/application_default_credentials.json
    volumes:
      # Share your local gcloud Application Default Credentials into the container
      # read-only, so Secret Manager works the same as `npm run start`. Created by
      # `gcloud auth application-default login`. Never baked into the image or
      # shipped to production.
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcloud/application_default_credentials.json:ro
      # Keep the local (disk) image store on a named volume so uploaded images
      # survive a container rebuild — the same way the Postgres data does.
      # Without this, `app:up` wipes every image while the records persist,
      # leaving applications pointing at files that are gone. Production stores
      # images in GCS, not here.
      - fed-tht-images:/app/var/images
    ports:
      - '3000:3000'

volumes:
  fed-tht-pgdata:
  fed-tht-images:
